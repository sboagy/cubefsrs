# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# Environment secrets (cubefsrs_ci_env): OP_SERVICE_ACCOUNT_TOKEN, CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, SUPABASE_JWT_SECRET, VITE_WORKER_URL
# All Supabase/app secrets are injected at runtime via `op run --env-file=".env.local.template"` using the OP_SERVICE_ACCOUNT_TOKEN.
# yamllint disable rule:line-length

name: CI - Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # <-- This is your manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node.js 24 for all JavaScript actions (required before June 2026 forced migration).
# This silences Node.js 20 deprecation warnings, including 1password/install-cli-action@v2
# which has no Node 24-native release yet.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # --------------------------------------------------------------------------
  # JOB 0: UNIT TESTS (VITEST)
  # --------------------------------------------------------------------------
  test-unit:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: cubefsrs_ci_env
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

    steps:
      - name: Checkout cubefsrs
        uses: actions/checkout@v5

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # npm's prepare hook for git deps may skip devDependencies (including vite),
      # leaving @rhizome/core without a built dist/. Rebuild explicitly.
      - name: Build @rhizome/core dependency
        run: (cd node_modules/@rhizome/core && npm install --include=dev && npm run build)

      - name: Run unit tests
        run: npm run test

  # --------------------------------------------------------------------------
  # JOB 1: PLAYWRIGHT E2E TESTS (Sharded)
  # --------------------------------------------------------------------------
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    needs: [test-unit]

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    timeout-minutes: 60
    environment: cubefsrs_ci_env
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      # Holding places: SUPABASE_URL and SUPABASE_ANON_KEY are populated after
      # `supabase start` runs (via GITHUB_ENV).  Set empty here so the step
      # env blocks below can reference them before population.
      SUPABASE_URL: ""
      SUPABASE_ANON_KEY: ""
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

    steps:
      - name: Checkout cubefsrs
        uses: actions/checkout@v5
        with:
          path: cubefsrs

      # oosync is a git-dependency; checkout alongside so npm ci can resolve
      # the local git+https reference without hitting network rate limits.
      - name: Checkout oosync
        uses: actions/checkout@v5
        with:
          repository: sboagy/oosync
          ref: main
          path: oosync

      # rhizome owns the shared local Supabase instance config and the
      # db-push-local.sh orchestration script used to apply migrations/seeds.
      - name: Checkout rhizome
        uses: actions/checkout@v5
        with:
          repository: sboagy/rhizome
          ref: main
          path: rhizome

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v2

      - name: AGGRESSIVE DISK CLEANUP
        if: runner.os == 'Linux'
        run: |
          echo "🧹 Removing large pre-installed SDKs..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo apt-get clean
          docker system prune -a -f || true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: cubefsrs/package-lock.json

      - name: Install dependencies
        working-directory: cubefsrs
        run: npm ci

      # npm's prepare hook for git deps may skip devDependencies (including vite),
      # leaving @rhizome/core without a built dist/. Rebuild explicitly.
      - name: Build @rhizome/core dependency
        working-directory: cubefsrs
        run: (cd node_modules/@rhizome/core && npm install --include=dev && npm run build)

      # --- Supabase Setup ---
      # Supabase is started from the rhizome directory because rhizome owns
      # the shared local supabase config.toml.
      - name: Cache Supabase CLI
        id: cache-supabase
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/supabase
          key: ${{ runner.os }}-supabase-cli-v1.200.0
          restore-keys: |
            ${{ runner.os }}-supabase-cli-v1.

      - name: Install Supabase CLI
        if: steps.cache-supabase.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/supabase-cli
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar -xz -C /tmp/supabase-cli
          sudo mv -f /tmp/supabase-cli/supabase /usr/local/bin/
          rm -rf /tmp/supabase-cli

      - name: Cache Supabase Docker Images
        id: cache-docker-images
        uses: actions/cache@v4
        with:
          path: ~/supabase-docker-images.tar
          key: ${{ runner.os }}-supabase-docker-v1.200.0
          restore-keys: |
            ${{ runner.os }}-supabase-docker-

      - name: Load Cached Docker Images
        if: steps.cache-docker-images.outputs.cache-hit == 'true'
        run: docker load -i ~/supabase-docker-images.tar

      # Start Supabase from the rhizome directory (shared config).
      - name: Start Supabase Local Stack
        id: supabase
        working-directory: rhizome
        run: |
          supabase start
          echo "SUPABASE_URL=$(supabase status --output json | jq -r '.API_URL')" >> $GITHUB_ENV
          echo "SUPABASE_ANON_KEY=$(supabase status --output json | jq -r '.ANON_KEY')" >> $GITHUB_ENV
          echo "VITE_SUPABASE_URL=$(supabase status --output json | jq -r '.API_URL')" >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=$(supabase status --output json | jq -r '.ANON_KEY')" >> $GITHUB_ENV

      - name: Wait for Supabase API (Health Check)
        run: |
          echo "🔍 Checking Supabase API health at $SUPABASE_URL/rest/v1"
          ATTEMPTS=0
          until CODE=$(curl -fsS -o /dev/null -w '%{http_code}' "$SUPABASE_URL/rest/v1" || true) && echo "$CODE" | grep -qE '200|401|404'; do
            ATTEMPTS=$((ATTEMPTS+1))
            if [ "$ATTEMPTS" -ge 30 ]; then exit 1; fi
            sleep 2
          done

      - name: Save Docker Images to Cache
        if: steps.cache-docker-images.outputs.cache-hit != 'true'
        run: |
          docker images --format "{{.Repository}}:{{.Tag}}" | grep supabase | xargs docker save -o ~/supabase-docker-images.tar

      # Apply CubeFSRS migrations and seeds via rhizome's orchestration script.
      # This avoids running `supabase db reset` (which resets the entire DB);
      # it instead applies only cubefsrs-scoped migrations and seeds.
      - name: Apply CubeFSRS Migrations and Seeds
        working-directory: rhizome
        run: |
          bash scripts/db-push-local.sh ${{ github.workspace }}/cubefsrs

      - name: Check SQLite schema via Postgres introspection
        working-directory: cubefsrs
        run: npm run codegen:schema:check

      # --- Playwright Setup ---
      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('cubefsrs/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        working-directory: cubefsrs
        run: npx playwright install --with-deps chromium

      - name: Install Playwright System Dependencies
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        working-directory: cubefsrs
        run: npx playwright install-deps chromium

      # Configure the sync worker .dev.vars using the local Supabase instance.
      # The JWT secret is the known local Supabase default for CI.
      - name: Setup Cloudflare Worker
        working-directory: cubefsrs
        run: |
          cd worker
          npm ci
          echo "SUPABASE_URL=${{ env.SUPABASE_URL }}" > .dev.vars
          echo "SUPABASE_JWT_SECRET=super-secret-jwt-token-with-at-least-32-characters-long" >> .dev.vars
          echo "DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:54322/postgres" >> .dev.vars

      # Pre-create output directories so artifact upload steps never fail with
      # "No files were found" when Playwright exits early or produces no output.
      - name: Create Playwright output directories
        working-directory: cubefsrs
        run: mkdir -p playwright-logs blob-report test-results

      - name: Run Playwright Tests (Shard ${{ matrix.shard }}/4)
        working-directory: cubefsrs
        run: |
          set -o pipefail
          echo "🎬 Running sharded test suite (shard ${{ matrix.shard }}/4)"
          npm run test:e2e -- \
            --shard=${{ matrix.shard }}/4 \
            --project=chromium-auth \
            --project=chromium \
            --project="Mobile Chrome" \
            2>&1 | tee "playwright-logs/playwright-shard-${{ matrix.shard }}.log"

      - name: Upload Playwright log (Shard ${{ matrix.shard }}/4)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-log-${{ matrix.shard }}
          path: cubefsrs/playwright-logs/playwright-shard-${{ matrix.shard }}.log
          retention-days: 7

      - name: Upload blob report to GitHub Actions Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: blob-report-${{ matrix.shard }}
          path: cubefsrs/blob-report/
          retention-days: 1

      - name: Upload Test Artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ matrix.shard }}
          path: cubefsrs/test-results/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        working-directory: rhizome
        run: supabase stop --no-backup

  # --------------------------------------------------------------------------
  # JOB 2: MERGE REPORTS
  # --------------------------------------------------------------------------
  merge-reports:
    name: Merge Playwright Reports
    if: always()
    needs: [test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cubefsrs
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports from all shards
        uses: actions/download-artifact@v6
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Download Playwright logs
        uses: actions/download-artifact@v6
        with:
          pattern: playwright-log-*
          path: all-playwright-logs
          merge-multiple: true

      - name: Assemble combined Playwright log
        run: |
          mkdir -p playwright-logs
          cat all-playwright-logs/*.log > playwright-logs/playwright-combined.log 2>/dev/null || echo "(no log files)" > playwright-logs/playwright-combined.log

      - name: Upload combined Playwright log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-log-combined
          path: playwright-logs/
          retention-days: 7

      - name: Merge into HTML Report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # --------------------------------------------------------------------------
  # JOB 3: DEPLOY
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [test-unit, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: cubefsrs_ci_env
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

    steps:
      - name: Checkout cubefsrs
        uses: actions/checkout@v5

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # npm's prepare hook for git deps may skip devDependencies (including vite),
      # leaving @rhizome/core without a built dist/. Rebuild explicitly.
      - name: Build @rhizome/core dependency
        run: (cd node_modules/@rhizome/core && npm install --include=dev && npm run build)

      # Build uses `op run` wrappers in package.json to inject VITE_ secrets
      # from the rhizome vault at build time.
      - name: Build Application
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=cubefsrs-pwa --branch=${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Output deployment URL
        if: success()
        run: echo "🚀 Deployment complete!"

  deploy-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    needs: [test-unit, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: cubefsrs_ci_env
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

    steps:
      - name: Checkout cubefsrs
        uses: actions/checkout@v5

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Worker Dependencies
        run: cd worker && npm ci

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "worker"
          command: deploy
          secrets: |
            SUPABASE_JWT_SECRET
        env:
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
