# Lighthouse CI - Performance Monitoring
# Runs Lighthouse audits on pushes and pull requests targeting main.

name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # <-- This is your manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node.js 24 for all JavaScript actions (required before June 2026 forced migration).
# This silences Node.js 20 deprecation warnings, including 1password/install-cli-action@v2
# which has no Node 24-native release yet.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # vite-plugin-pwa@1.2.0 still advertises a Vite <=7 peer range even though
  # CubeFSRS has been verified to build on Vite 8. Keep Lighthouse CI from
  # failing on that stale peer metadata until upstream updates it.
  NPM_CONFIG_LEGACY_PEER_DEPS: "true"

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    environment: cubefsrs_ci_env
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

    steps:
      - name: Checkout cubefsrs
        uses: actions/checkout@v5

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Build flows through the production build template so the analyzed bundle
      # matches deployed app settings without requiring deploy-only secrets.
      - name: Build Application
        run: npm run build

      # Pre-create output directory so the artifact upload step never fails
      # with "No files were found" when Lighthouse produces no output.
      - name: Create Lighthouse output directory
        run: mkdir -p .lighthouseci

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.13.x
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ github.token }}

      - name: Upload Lighthouse Reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 30
          # lhci uploads to temporary-public-storage; local files may not exist
          if-no-files-found: ignore

      - name: Comment PR with Lighthouse Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = '.lighthouseci/manifest.json';

            if (!fs.existsSync(reportPath)) {
              console.log('No Lighthouse manifest found');
              return;
            }

            const manifest = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const reports = manifest.map(report => report.url).filter(Boolean);

            const comment = `## Lighthouse CI Results

            Lighthouse audits completed for CubeFSRS.
            ${reports.length ? reports.map((url, i) => `- [Report ${i + 1}](${url})`).join('\n') : '- No public report URLs were generated; see workflow artifacts.'}

            Performance targets:
            - Performance score >= 0.7
            - Accessibility score >= 0.8
            - Best Practices score >= 0.8
            - SEO score >= 0.8

            See workflow artifacts for the full Lighthouse output.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });